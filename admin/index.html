<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Eurosoccer</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <header>
        <h1>Eurosoccer | Gestión de Reservas</h1>
        <button id="btn-logout" class="hidden" onclick="cerrarSesion()">Cerrar Sesión</button>
    </header>

    <main>
        <section id="login-section" class="login-box">
            <h2>Acceso Administrativo</h2>
            <form id="form-login">
                <input type="password" id="admin-pass" placeholder="Contraseña de Admin" required>
                <button type="submit">Ingresar</button>
                <p id="login-error" class="hidden" style="color: red; margin-top: 10px;">Contraseña incorrecta</p>
            </form>
        </section>

        <section id="dashboard-section" class="hidden">
            <div class="dashboard-header">
                <h2>Turnos Activos</h2>
            </div>
            <div class="table-container">
                <table id="tabla-reservas">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Cancha</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-reservas">
                        </tbody>
                </table>
            </div>
        </section>

        <div id="modal-editar" class="modal hidden">
            <div class="modal-content">
                <h3>Editar Reserva <span id="txt-edit-id"></span></h3>
                <form id="form-editar">
                    <input type="hidden" id="edit-id">
                    
                    <label>Cliente:</label>
                    <input type="text" id="edit-cliente" required>
                    
                    <label>Cancha:</label>
                    <select id="edit-cancha" required>
                        <option value="Cancha Principal 11v11">Principal 11v11</option>
                        <option value="Cancha 7v7 A">7v7 A</option>
                        <option value="Cancha 7v7 B">7v7 B</option>
                    </select>

                    <label>Fecha:</label>
                    <input type="date" id="edit-fecha" required>

                    <label>Hora:</label>
                    <select id="edit-hora" required>
                        <option value="08:00">8:00 AM - 9:00 AM</option>
                        <option value="09:00">9:00 AM - 10:00 AM</option>
                        <option value="10:00">10:00 AM - 11:00 AM</option>
                        <option value="11:00">11:00 AM - 12:00 PM</option>
                        <option value="12:00">12:00 PM - 1:00 PM</option>
                        <option value="13:00">1:00 PM - 2:00 PM</option>
                        <option value="14:00">2:00 PM - 3:00 PM</option>
                        <option value="15:00">3:00 PM - 4:00 PM</option>
                        <option value="16:00">4:00 PM - 5:00 PM</option>
                        <option value="17:00">5:00 PM - 6:00 PM</option>
                        <option value="18:00">6:00 PM - 7:00 PM</option>
                        <option value="19:00">7:00 PM - 8:00 PM</option>
                        <option value="20:00">8:00 PM - 9:00 PM</option>
                        <option value="21:00">9:00 PM - 10:00 PM</option>
                        <option value="22:00">10:00 PM - 11:00 PM</option>
</select>

                    <div class="modal-buttons">
                        <button type="submit" class="btn-guardar">Guardar Cambios</button>
                        <button type="button" class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="admin.js"></script>
    
</body>
</html>
